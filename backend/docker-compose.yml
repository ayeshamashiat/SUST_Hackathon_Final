services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      BKASH_DB_PASSWORD: ${BKASH_DB_PASSWORD:-bkash_pw}
      NAGAD_DB_PASSWORD: ${NAGAD_DB_PASSWORD:-nagad_pw}
      ROCKET_DB_PASSWORD: ${ROCKET_DB_PASSWORD:-rocket_pw}
      SHARED_DB_PASSWORD: ${SHARED_DB_PASSWORD:-shared_pw}
      SYNC_SERVICE_DB_PASSWORD: ${SYNC_SERVICE_DB_PASSWORD:-sync_pw}
      AGGREGATOR_DB_PASSWORD: ${AGGREGATOR_DB_PASSWORD:-aggregator_pw}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Not exposed to the frontend. Owns bkash_db/nagad_db/rocket_db access and
  # (from Phase 2 on) the /simulator router. Only aggregator-api talks to it,
  # over the internal compose network.
  #
  # Deliberately an explicit `environment:` allow-list, not `env_file: .env`
  # - a shared env_file would hand every service's credentials to every
  # container (e.g. aggregator-api would receive nagad_service's full-access
  # password even though its code never reads it), which quietly weakens the
  # "aggregator must never query provider databases" and provider-boundary
  # guarantees down to "the code doesn't currently do that" instead of "the
  # credential to do that isn't even present." Each service below gets only
  # the variables its own config.py actually declares.
  provider-api:
    build: ./provider-api
    environment:
      BKASH_DATABASE_URL: ${BKASH_DATABASE_URL}
      NAGAD_DATABASE_URL: ${NAGAD_DATABASE_URL}
      ROCKET_DATABASE_URL: ${ROCKET_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"  # dev-only convenience; not required by the frontend

  # Not exposed to the frontend. Polls the three provider databases directly
  # and projects into shared_db. Never talks to provider-api over HTTP.
  sync-service:
    build: ./sync-service
    environment:
      SYNC_BKASH_DATABASE_URL: ${SYNC_BKASH_DATABASE_URL}
      SYNC_NAGAD_DATABASE_URL: ${SYNC_NAGAD_DATABASE_URL}
      SYNC_ROCKET_DATABASE_URL: ${SYNC_ROCKET_DATABASE_URL}
      SYNC_SHARED_DATABASE_URL: ${SYNC_SHARED_DATABASE_URL}
      SYNC_POLL_INTERVAL_SECONDS: ${SYNC_POLL_INTERVAL_SECONDS:-10}
      SYNC_STALE_AFTER_SECONDS: ${SYNC_STALE_AFTER_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"  # dev-only convenience; not required by the frontend

  # The only service the frontend talks to (matches its existing
  # NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 default). Reads shared_db
  # only; proxies /simulation/* to provider-api's /simulator router
  # internally so the frontend needs zero changes. Note the absence of any
  # BKASH_/NAGAD_/ROCKET_ variable below - it has no provider DB credential
  # to use even if a bug tried to.
  aggregator-api:
    build: ./aggregator-api
    environment:
      SHARED_DATABASE_URL: ${SHARED_DATABASE_URL}
      AGGREGATOR_DATABASE_URL: ${AGGREGATOR_DATABASE_URL}
      SYNC_STALE_AFTER_SECONDS: ${SYNC_STALE_AFTER_SECONDS:-60}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-insecure-secret-change-me-before-any-real-deployment}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      DEMO_LOGIN_CODE: ${DEMO_LOGIN_CODE:-Passw0rd!}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
